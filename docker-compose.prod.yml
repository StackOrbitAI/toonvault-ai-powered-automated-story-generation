please# Production docker-compose - Coolify se independent
# Data volumes: /data/coolify/applications/toonvault/* (existing data preserved)
# SSL: /etc/letsencrypt/live/toonvault.com/ (Let's Encrypt certs)

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: toonvault
    volumes:
      - /data/coolify/applications/toonvault/postgres:/var/lib/postgresql/data
    networks:
      - toonvault_prod_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d toonvault"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - /data/coolify/applications/toonvault/redis:/data
    networks:
      - toonvault_prod_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:6
    restart: always
    volumes:
      - /data/coolify/applications/toonvault/mongo:/data/db
    networks:
      - toonvault_prod_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: jnapjz5a1sc73wbn0wukv8ps-backend:latest
    restart: always
    environment:
      DATABASE_URL: postgres://user:password@db:5432/toonvault
      REDIS_URL: redis://redis:6379
      PORT: 5000
      MISTRAL_API_KEY: VztpyOHj6iS6uF8FKNRvLLxFeG3oS3RR
      RUNWARE_API_KEY: qHl8dL3BSobrD7j52dc2aTMK4E1lRQTy
      RUNWARE_MODEL: runware:100@1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - toonvault_prod_net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5000/api/settings/public || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: jnapjz5a1sc73wbn0wukv8ps-frontend:latest
    restart: always
    volumes:
      - /data/coolify/applications/toonvault/uploads:/usr/share/nginx/html/uploads:ro
    networks:
      - toonvault_prod_net

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /root/toonvault/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /data/coolify/applications/toonvault/uploads:/var/www/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - toonvault_prod_net

networks:
  toonvault_prod_net:
    driver: bridge
